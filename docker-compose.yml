version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: wekelea-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wekelea
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wekelea-backend
    restart: always
    ports:
      - '5001:5001'
    environment:
      - NODE_ENV=production
      - PORT=5001
      - JWT_SECRET=wekelea_secure_mvp_jwt_secret_token_2026
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/wekelea?schema=public
      - MPESA_SHORTCODE=174379
      - MPESA_PASSKEY=bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919
      - MPESA_CONSUMER_KEY=simulated_daraja_consumer_key_xyz
      - MPESA_CONSUMER_SECRET=simulated_daraja_consumer_secret_xyz
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wekelea-frontend
    restart: always
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
    depends_on:
      - backend

volumes:
  postgres_data:
